<!-- Only the script section changes to display sources_used -->
<script>
    // ... (previous code up to displayGames function)

    function displayGames(games) {
        const container = document.getElementById('gamesContainer');
        if (!games.length) {
            container.innerHTML = '<p style="text-align: center;">No games found.</p>';
            return;
        }
        container.innerHTML = games.map(game => {
            // Build source badges if available
            const sourceInfo = game.sources_used ? 
                `<div style="margin-top: 0.5rem; font-size: 0.8rem; color: #666;">
                    ${game.sources_used.map(s => 
                        Object.entries(s).map(([field, src]) => 
                            `<span style="background: #eef; padding: 2px 6px; border-radius: 12px; margin-right: 4px;">${field} from ${src}</span>`
                        ).join('')
                    ).join('')}
                </div>` : '';
            
            return `
                <div class="game-card">
                    <div class="game-content">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-meta">
                            <span>📅 ${escapeHtml(game.release_date)}</span>
                            <span>🎮 ${escapeHtml(game.platforms)}</span>
                        </div>
                        <div class="field"><strong>Developer:</strong> ${escapeHtml(game.developer)}</div>
                        <div class="field"><strong>Publisher:</strong> ${escapeHtml(game.publisher)}</div>
                        <div class="field"><strong>Features:</strong> <span class="${game.key_features === 'Not Available' ? 'not-avail' : ''}">${escapeHtml(game.key_features)}</span></div>
                        ${sourceInfo}
                    </div>
                    <a class="game-link" href="${escapeHtml(game.url)}" target="_blank" rel="noopener">View original →</a>
                </div>
            `;
        }).join('');
    }
    // ... rest of the script (filter, etc.)
</script>
