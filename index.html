<!-- Add this to your controls section -->
<div class="url-input-section" style="margin-bottom: 20px;">
    <h3>Scrape from URL</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="url" 
               id="urlInput" 
               placeholder="Enter game page URL (e.g., https://www.destructoid.com/game-hub/arc-raiders/)" 
               style="flex: 2; padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
        <button class="btn" id="scrapeUrlBtn">Scrape URL</button>
        <button class="btn" id="destructoidMenuBtn" style="background: #4a4a6a;">🎮 Destructoid Menu</button>
    </div>
    <p style="margin-top: 5px; color: #666; font-size: 0.9em;">
        Works with Destructoid, IGN, GameSpot, and many other gaming sites
    </p>
</div>

<script>
    const BACKEND_URL = 'https://scraperbackend.vercel.app';
    
    // Destructoid menu button (your original feature)
    document.getElementById('destructoidMenuBtn').addEventListener('click', scrapeDestructoidMenu);
    
    // URL input button
    document.getElementById('scrapeUrlBtn').addEventListener('click', scrapeFromUrl);
    
    async function scrapeDestructoidMenu() {
        await scrapeGames('menu');
    }
    
    async function scrapeFromUrl() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) {
            alert('Please enter a URL');
            return;
        }
        await scrapeGames('url', url);
    }
    
    async function scrapeGames(mode, url = null) {
        const btn = mode === 'menu' ? 
            document.getElementById('destructoidMenuBtn') : 
            document.getElementById('scrapeUrlBtn');
        const loading = document.getElementById('loading');
        const container = document.getElementById('gamesContainer');
        const searchInput = document.getElementById('searchInput');
        
        btn.disabled = true;
        loading.style.display = 'block';
        container.innerHTML = '';
        searchInput.disabled = true;
        
        try {
            let response;
            if (mode === 'menu') {
                response = await fetch(`${BACKEND_URL}/api/scrape`);
            } else {
                response = await fetch(`${BACKEND_URL}/api/scrape-url`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
            }
            
            if (!response.ok) throw new Error(`HTTP error ${response.status}`);
            
            const games = await response.json();
            if (games.error) throw new Error(games.error);
            
            allGames = games;
            displayGames(games);
            searchInput.disabled = false;
            
        } catch (err) {
            container.innerHTML = `<p style="color: red;">❌ Error: ${err.message}</p>`;
        } finally {
            btn.disabled = false;
            loading.style.display = 'none';
        }
    }
    
    // Your existing displayGames and escapeHtml functions remain the same
</script>
