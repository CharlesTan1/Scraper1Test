<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Info Scraper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #1a1a2e;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        header h1 { margin-bottom: 0.5rem; }
        header p { opacity: 0.9; }
        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 2rem;
            flex: 1;
            width: 100%;
        }
        .controls {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1rem;
        }
        .url-input-group {
            display: flex;
            gap: 0.5rem;
            flex: 1;
            min-width: 300px;
        }
        .url-input-group input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: #162b4d; }
        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        .btn.menu-btn {
            background: #4a4a6a;
        }
        .btn.menu-btn:hover { background: #5a5a7a; }
        .search-box {
            margin-top: 1rem;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #666;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }
        .game-content {
            padding: 1.5rem;
            flex: 1;
        }
        .game-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1a1a2e;
        }
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin: 0.75rem 0;
            font-size: 0.9rem;
            color: #555;
        }
        .game-meta span {
            background: #f0f2f5;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        .field {
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }
        .field strong {
            color: #333;
            display: inline-block;
            min-width: 90px;
        }
        .not-avail {
            color: #999;
            font-style: italic;
        }
        .game-link {
            display: block;
            text-align: center;
            background: #f8f9fa;
            padding: 0.8rem;
            color: #0f3460;
            text-decoration: none;
            font-weight: 500;
            border-top: 1px solid #eee;
            transition: background 0.2s;
        }
        .game-link:hover {
            background: #e9ecef;
            text-decoration: underline;
        }
        footer {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .note {
            font-size: 0.9rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Game Info Scraper</h1>
        <p>Extract game details from Destructoid or any game URL</p>
    </header>

    <div class="container">
        <div class="controls">
            <div class="button-group">
                <button class="btn menu-btn" id="destructoidMenuBtn">🎮 Destructoid Menu (10 games)</button>
                <div class="url-input-group">
                    <input type="url" id="urlInput" placeholder="Enter any game URL (Destructoid, IGN, etc.)">
                    <button class="btn" id="scrapeUrlBtn">Scrape URL</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Filter by title or platform..." disabled>
            </div>
            <div class="note">
                ⚡ For Destructoid, you can use either the menu button or paste a specific URL.
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">⏳ Scraping in progress... please wait</div>
        <div id="gamesContainer" class="games-grid"></div>
    </div>

    <footer>
        <p>Data provided for educational purposes – All rights belong to their respective owners</p>
    </footer>

    <script>
        // 🔧 REPLACE WITH YOUR ACTUAL BACKEND URL
        const BACKEND_URL = 'https://scraperbackend.vercel.app';

        let allGames = [];

        // Event listeners
        document.getElementById('destructoidMenuBtn').addEventListener('click', scrapeDestructoidMenu);
        document.getElementById('scrapeUrlBtn').addEventListener('click', scrapeFromUrl);
        document.getElementById('searchInput').addEventListener('input', filterGames);

        async function scrapeDestructoidMenu() {
            await fetchGames('menu');
        }

        async function scrapeFromUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            await fetchGames('url', url);
        }

        async function fetchGames(mode, url = null) {
            const menuBtn = document.getElementById('destructoidMenuBtn');
            const urlBtn = document.getElementById('scrapeUrlBtn');
            const loading = document.getElementById('loading');
            const container = document.getElementById('gamesContainer');
            const searchInput = document.getElementById('searchInput');
            
            menuBtn.disabled = true;
            urlBtn.disabled = true;
            loading.style.display = 'block';
            container.innerHTML = '';
            searchInput.disabled = true;
            searchInput.value = '';

            try {
                let response;
                if (mode === 'menu') {
                    response = await fetch(`${BACKEND_URL}/api/scrape`);
                } else {
                    response = await fetch(`${BACKEND_URL}/api/scrape-url`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: url })
                    });
                }

                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const games = await response.json();
                if (games.error) throw new Error(games.error);

                allGames = games;
                displayGames(games);
                searchInput.disabled = false;
                document.getElementById('urlInput').value = ''; // clear input
            } catch (err) {
                container.innerHTML = `<p style="color: red; text-align: center;">❌ Error: ${err.message}</p>`;
            } finally {
                menuBtn.disabled = false;
                urlBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function displayGames(games) {
            const container = document.getElementById('gamesContainer');
            if (!games.length) {
                container.innerHTML = '<p style="text-align: center;">No games found.</p>';
                return;
            }
            container.innerHTML = games.map(game => {
                // Build source badges if available (from fusion)
                let sourceInfo = '';
                if (game.sources_used && game.sources_used.length) {
                    sourceInfo = '<div style="margin-top: 0.5rem; font-size: 0.8rem; color: #666;">';
                    game.sources_used.forEach(s => {
                        Object.entries(s).forEach(([field, src]) => {
                            sourceInfo += `<span style="background: #eef; padding: 2px 6px; border-radius: 12px; margin-right: 4px;">${field} from ${src}</span>`;
                        });
                    });
                    sourceInfo += '</div>';
                }
                
                return `
                    <div class="game-card">
                        <div class="game-content">
                            <div class="game-title">${escapeHtml(game.title)}</div>
                            <div class="game-meta">
                                <span>📅 ${escapeHtml(game.release_date)}</span>
                                <span>🎮 ${escapeHtml(game.platforms)}</span>
                            </div>
                            <div class="field"><strong>Developer:</strong> ${escapeHtml(game.developer)}</div>
                            <div class="field"><strong>Publisher:</strong> ${escapeHtml(game.publisher)}</div>
                            <div class="field"><strong>Features:</strong> <span class="${game.key_features === 'Not Available' ? 'not-avail' : ''}">${escapeHtml(game.key_features)}</span></div>
                            ${sourceInfo}
                        </div>
                        <a class="game-link" href="${escapeHtml(game.url)}" target="_blank" rel="noopener">View original →</a>
                    </div>
                `;
            }).join('');
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function filterGames(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(game =>
                game.title.toLowerCase().includes(term) ||
                game.platforms.toLowerCase().includes(term)
            );
            displayGames(filtered);
        }
    </script>
</body>
</html>
