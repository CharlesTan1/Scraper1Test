<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destructoid Game Scraper</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: #1a1a2e;
            color: white;
            padding: 2rem 1rem;
            text-align: center;
        }
        header h1 { margin-bottom: 0.5rem; }
        header p { opacity: 0.9; }
        .container {
            max-width: 1300px;
            margin: 2rem auto;
            padding: 0 2rem;
            flex: 1;
            width: 100%;
        }
        .controls {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .button-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            background: #0f3460;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: #162b4d; }
        .btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }
        .url-input-group {
            display: flex;
            gap: 0.5rem;
            flex: 1;
        }
        .url-input-group input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .search-box {
            margin-top: 0.5rem;
        }
        .search-box input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            color: #666;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        .game-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }
        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
        }
        .game-content {
            padding: 1.5rem;
            flex: 1;
        }
        .game-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #1a1a2e;
        }
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1rem;
            margin: 0.75rem 0;
            font-size: 0.9rem;
            color: #555;
        }
        .game-meta span {
            background: #f0f2f5;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
        }
        .field {
            margin: 0.5rem 0;
            font-size: 0.95rem;
        }
        .field strong {
            color: #333;
            display: inline-block;
            min-width: 90px;
        }
        .not-avail {
            color: #999;
            font-style: italic;
        }
        .game-link {
            display: block;
            text-align: center;
            background: #f8f9fa;
            padding: 0.8rem;
            color: #0f3460;
            text-decoration: none;
            font-weight: 500;
            border-top: 1px solid #eee;
            transition: background 0.2s;
        }
        .game-link:hover {
            background: #e9ecef;
            text-decoration: underline;
        }
        footer {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 Destructoid Game Scraper</h1>
        <p>Extract 10 games from Destructoid – missing fields show as "Not Available"</p>
    </header>

    <div class="container">
        <div class="controls">
            <div class="button-row">
                <button class="btn" id="menuBtn">🎮 Destructoid Menu (10 games)</button>
                <div class="url-input-group">
                    <input type="url" id="urlInput" placeholder="Enter Destructoid URL (e.g., https://www.destructoid.com/)" value="https://www.destructoid.com/">
                    <button class="btn" id="urlBtn">Scrape from URL</button>
                </div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Filter by title or platform..." disabled>
            </div>
        </div>

        <div id="loading" class="loading" style="display: none;">⏳ Scraping in progress... please wait</div>
        <div id="gamesContainer" class="games-grid"></div>
    </div>

    <footer>
        <p>Data provided for educational purposes – All rights belong to Destructoid</p>
    </footer>

    <script>
        // 🔧 REPLACE WITH YOUR ACTUAL BACKEND URL
        const BACKEND_URL = 'https://scraperbackend2.vercel.app';

        let allGames = [];

        document.getElementById('menuBtn').addEventListener('click', () => scrapeGames('menu'));
        document.getElementById('urlBtn').addEventListener('click', () => scrapeGames('url'));
        document.getElementById('searchInput').addEventListener('input', filterGames);

        async function scrapeGames(mode) {
            const menuBtn = document.getElementById('menuBtn');
            const urlBtn = document.getElementById('urlBtn');
            const loading = document.getElementById('loading');
            const container = document.getElementById('gamesContainer');
            const searchInput = document.getElementById('searchInput');

            menuBtn.disabled = true;
            urlBtn.disabled = true;
            loading.style.display = 'block';
            container.innerHTML = '';
            searchInput.disabled = true;
            searchInput.value = '';

            try {
                // Both modes call the same endpoint – the backend ignores the URL and just returns the menu games.
                const response = await fetch(`${BACKEND_URL}/api/scrape`);
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const games = await response.json();
                if (games.error) throw new Error(games.error);

                allGames = games;
                displayGames(games);
                searchInput.disabled = false;
            } catch (err) {
                container.innerHTML = `<p style="color: red; text-align: center;">❌ Error: ${err.message}</p>`;
            } finally {
                menuBtn.disabled = false;
                urlBtn.disabled = false;
                loading.style.display = 'none';
            }
        }

        function displayGames(games) {
            const container = document.getElementById('gamesContainer');
            if (!games.length) {
                container.innerHTML = '<p style="text-align: center;">No games found.</p>';
                return;
            }
            container.innerHTML = games.map(game => `
                <div class="game-card">
                    <div class="game-content">
                        <div class="game-title">${escapeHtml(game.title)}</div>
                        <div class="game-meta">
                            <span>📅 ${escapeHtml(game.release_date)}</span>
                            <span>🎮 ${escapeHtml(game.platforms)}</span>
                        </div>
                        <div class="field"><strong>Developer:</strong> ${escapeHtml(game.developer)}</div>
                        <div class="field"><strong>Publisher:</strong> ${escapeHtml(game.publisher)}</div>
                        <div class="field"><strong>Features:</strong> <span class="${game.key_features === 'Not Available' ? 'not-avail' : ''}">${escapeHtml(game.key_features)}</span></div>
                    </div>
                    <a class="game-link" href="${escapeHtml(game.url)}" target="_blank">View original →</a>
                </div>
            `).join('');
        }

        function escapeHtml(unsafe) {
            if (unsafe == null) return '';
            return String(unsafe)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function filterGames(e) {
            const term = e.target.value.toLowerCase();
            const filtered = allGames.filter(game =>
                game.title.toLowerCase().includes(term) ||
                game.platforms.toLowerCase().includes(term)
            );
            displayGames(filtered);
        }
    </script>
</body>
</html>
